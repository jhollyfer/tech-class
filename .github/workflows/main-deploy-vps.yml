name: Deploy to VPS

on:
  workflow_call:
    secrets:
      VPS_HOST:
        required: true
      VPS_USER:
        required: true
      VPS_SSH_KEY:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      APP_KEY:
        required: true
      DB_HOST:
        required: true
      DB_PORT:
        required: true
      DB_USER:
        required: true
      DB_PASSWORD:
        required: true
      DB_DATABASE:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create deployment directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: mkdir -p /home/${{ secrets.VPS_USER }}/tech-class

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.production.yml"
          target: "/home/${{ secrets.VPS_USER }}/tech-class/"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/${{ secrets.VPS_USER }}/tech-class

            cat > .env << EOF
            ENVIRONMENT=production
            DOCKER_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            NODE_ENV=production
            APP_KEY=${{ secrets.APP_KEY }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            APP_URL=https://api.tech-class.maiyu.com.br
            CORS_ORIGIN=https://tech-class.maiyu.com.br
            API_HOST=api.tech-class.maiyu.com.br
            APP_HOST=tech-class.maiyu.com.br
            EOF

            docker compose -f docker-compose.production.yml pull
            docker image prune -f || true
            docker compose -f docker-compose.production.yml up -d --force-recreate

            echo "Deploy completed successfully!"
