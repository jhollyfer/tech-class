name: ${ENVIRONMENT:-production}-tech-class

services:
  api:
    image: ${DOCKER_USERNAME}/tech-class-api:${ENVIRONMENT:-latest}
    restart: unless-stopped
    mem_limit: 256m
    environment:
      NODE_ENV: production
      TZ: UTC
      PORT: 3333
      HOST: 0.0.0.0
      LOG_LEVEL: info
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-https://api.tech-class.maiyu.com.br}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://tech-class.maiyu.com.br}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
    networks:
      - traefik-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3333/health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tech-class-api.rule=Host(`${API_HOST:-api.tech-class.maiyu.com.br}`)"
      - "traefik.http.routers.tech-class-api.entrypoints=websecure"
      - "traefik.http.routers.tech-class-api.tls.certresolver=myresolver"
      - "traefik.http.services.tech-class-api.loadbalancer.server.port=3333"
      - "traefik.http.routers.tech-class-api-http.rule=Host(`${API_HOST:-api.tech-class.maiyu.com.br}`)"
      - "traefik.http.routers.tech-class-api-http.entrypoints=web"
      - "traefik.http.routers.tech-class-api-http.middlewares=https-only@file"

  app:
    image: ${DOCKER_USERNAME}/tech-class-app:${ENVIRONMENT:-latest}
    restart: unless-stopped
    mem_limit: 256m
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
    depends_on:
      - api
    networks:
      - traefik-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tech-class-app.rule=Host(`${APP_HOST:-tech-class.maiyu.com.br}`)"
      - "traefik.http.routers.tech-class-app.entrypoints=websecure"
      - "traefik.http.routers.tech-class-app.tls.certresolver=myresolver"
      - "traefik.http.services.tech-class-app.loadbalancer.server.port=3000"
      - "traefik.http.routers.tech-class-app-http.rule=Host(`${APP_HOST:-tech-class.maiyu.com.br}`)"
      - "traefik.http.routers.tech-class-app-http.entrypoints=web"
      - "traefik.http.routers.tech-class-app-http.middlewares=https-only@file"
      # Headers anti-cache para garantir que navegadores busquem sempre a versão mais recente
      - "traefik.http.middlewares.tech-class-app-headers.headers.customResponseHeaders.Cache-Control=no-cache, no-store, must-revalidate"
      - "traefik.http.middlewares.tech-class-app-headers.headers.customResponseHeaders.Pragma=no-cache"
      - "traefik.http.middlewares.tech-class-app-headers.headers.customResponseHeaders.Expires=0"
      - "traefik.http.routers.tech-class-app.middlewares=tech-class-app-headers"

networks:
  traefik-network:
    external: true
