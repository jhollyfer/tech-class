openapi: '3.0.0'
info:
  title: 'academy API'
  version: '0.0.1'
  description: 'API da plataforma academy — cursos, aulas e quizzes interativos.'
components:
  responses:
    Forbidden:
      description: 'Access token is missing or invalid'
    Accepted:
      description: 'The request was accepted'
    Created:
      description: 'The resource has been created'
    NotFound:
      description: 'The resource has been created'
    NotAcceptable:
      description: 'The resource has been created'
  securitySchemes:
    BearerAuth:
      type: 'http'
      scheme: 'bearer'
      bearerFormat: 'JWT'
    BasicAuth:
      type: 'http'
      scheme: 'basic'
    ApiKeyAuth:
      type: 'apiKey'
      in: 'header'
      name: 'X-API-Key'
  schemas:
    Any:
      description: 'Any JSON object not defined as schema'
    PaginationMeta:
      type: 'object'
      properties:
        total:
          type: 'number'
          example: 100
          nullable: false
        page:
          type: 'number'
          example: 2
          nullable: false
        perPage:
          type: 'number'
          example: 10
          nullable: false
        currentPage:
          type: 'number'
          example: 3
          nullable: false
        lastPage:
          type: 'number'
          example: 10
          nullable: false
        firstPage:
          type: 'number'
          example: 1
          nullable: false
        lastPageUrl:
          type: 'string'
          example: '/?page=10'
          nullable: false
        firstPageUrl:
          type: 'string'
          example: '/?page=1'
          nullable: false
        nextPageUrl:
          type: 'string'
          example: '/?page=6'
          nullable: false
        previousPageUrl:
          type: 'string'
          example: '/?page=5'
          nullable: false
    Admin:
      type: 'object'
      required: []
      properties:
        current_access_token:
          $ref: '#/components/schemas/AccessToken'
          example: null
        id:
          type: 'string'
          example: 'Lorem Ipsum'
        name:
          type: 'string'
          example: 'John Doe'
        email:
          type: 'string'
          example: 'johndoe@example.com'
          format: 'email'
        active:
          type: 'boolean'
          example: true
        created_at:
          type: 'string'
          example: '2021-03-23T16:13:08.489+01:00'
          format: 'date-time'
      description: 'Admin (Model)'
paths:
  /documentation:
    get:
      summary: 'route'
      description: "\n\n __ - ****"
      parameters: []
      tags: []
      responses:
        200:
          description: 'OK'
          content:
            application/json: {}
      security: []
  /health-check:
    get:
      summary: 'route'
      description: "\n\n __ - ****"
      parameters: []
      tags: []
      responses:
        200:
          description: 'OK'
          content:
            application/json: {}
      security: []
  /api/courses:
    get:
      summary: 'Lista todos os cursos disponíveis (handle)'
      description: "Returns **200** (OK) as **application/json**\n\n _app/resources/courses/list/list.controller.ts_ - **handle**"
      parameters: []
      tags:
        - 'COURSES'
      responses:
        200:
          content:
            application/json:
              schema:
                type: 'object'
                properties:
                  courses:
                    type: 'object'
                    properties:
                      0:
                        type: 'object'
                        properties:
                          slug: 'logica-programacao-typescript'
                          label: 'Lógica de Programação'
                          language: 'TypeScript'
                          lessonCount: 10
                          moduleCount: 3
              example:
                courses:
                  - slug: 'logica-programacao-typescript'
                    label: 'Lógica de Programação'
                    language: 'TypeScript'
                    lessonCount: 10
                    moduleCount: 3
          description: 'Returns **200** (OK) as **application/json**'
      security: []
  /api/courses/{courseSlug}/modules:
    get:
      summary: 'Lista módulos de um curso (handle)'
      description: "Returns **200** (OK) as **application/json**\n\n _app/resources/courses/modules/modules.controller.ts_ - **handle**"
      parameters:
        - in: 'path'
          name: 'courseSlug'
          description: 'Slug do curso'
          schema:
            example: ''
            type: 'string'
          required: true
      tags:
        - 'MODULES'
      responses:
        200:
          content:
            application/json:
              schema:
                type: 'object'
                properties:
                  modules:
                    type: 'object'
                    properties:
                      0:
                        type: 'object'
                        properties:
                          name: 'Módulo 1 — Fundamentos'
                          lessonCount: 5
                          questionCount: 12
              example:
                modules:
                  - name: 'Módulo 1 — Fundamentos'
                    lessonCount: 5
                    questionCount: 12
          description: 'Returns **200** (OK) as **application/json**'
        404:
          content:
            application/json:
              schema:
                type: 'object'
                properties:
                  message: 'Curso não encontrado.'
              example:
                message: 'Curso não encontrado.'
          description: 'Returns **404** (Not Found) as **application/json**'
      security: []
  /api/courses/{courseSlug}/lessons:
    get:
      summary: 'Lista aulas de um curso (handle)'
      description: "Returns **200** (OK) as **application/json**\n\n _app/resources/lessons/list/list.controller.ts_ - **handle**"
      parameters:
        - in: 'path'
          name: 'courseSlug'
          description: 'Slug do curso'
          schema:
            example: ''
            type: 'string'
          required: true
      tags:
        - 'LESSONS'
      responses:
        200:
          content:
            application/json:
              schema:
                type: 'object'
                properties:
                  lessons:
                    type: 'object'
                    properties:
                      0:
                        type: 'object'
                        properties:
                          slug: 'variaveis'
                          modulo: 'Módulo 1'
                          titulo: 'Variáveis'
                          subtitulo: ''
                          descricao: 'Aprenda sobre variáveis'
                          ordem: 1
                          quizCount: 3
              example:
                lessons:
                  - slug: 'variaveis'
                    modulo: 'Módulo 1'
                    titulo: 'Variáveis'
                    subtitulo: ''
                    descricao: 'Aprenda sobre variáveis'
                    ordem: 1
                    quizCount: 3
          description: 'Returns **200** (OK) as **application/json**'
        404:
          content:
            application/json:
              schema:
                type: 'object'
                properties:
                  message: 'Curso não encontrado.'
              example:
                message: 'Curso não encontrado.'
          description: 'Returns **404** (Not Found) as **application/json**'
      security: []
  /api/courses/{courseSlug}/lessons/{lessonSlug}/quiz-questions:
    get:
      summary: 'Questões de quiz de uma aula específica (handle)'
      description: "Returns **200** (OK) as **application/json**\n\n _app/resources/quiz/lesson-questions/lesson-questions.controller.ts_ - **handle**"
      parameters:
        - in: 'path'
          name: 'courseSlug'
          description: 'Slug do curso'
          schema:
            example: ''
            type: 'string'
          required: true
        - in: 'path'
          name: 'lessonSlug'
          description: 'Slug da aula'
          schema:
            example: ''
            type: 'string'
          required: true
      tags:
        - 'QUIZ'
      responses:
        200:
          content:
            application/json:
              schema:
                type: 'object'
                properties:
                  questionCount: 3
                  questions:
                    type: 'object'
                    properties:
                      0:
                        type: 'object'
                        properties:
                          lessonTitulo: 'Variáveis'
                          lessonDescricao: 'Aprenda variáveis'
                          lessonModulo: 'Módulo 1'
                          pergunta: 'O que é?'
                          opcoes:
                            type: 'object'
                            properties:
                              0: 'A'
                              1: 'B'
                              2: 'C'
                              3: 'D'
                          correta: 0
                          explicacao: 'Porque...'
                          explicacaoErrada: 'Errado porque...'
              example:
                questionCount: 3
                questions:
                  - lessonTitulo: 'Variáveis'
                    lessonDescricao: 'Aprenda variáveis'
                    lessonModulo: 'Módulo 1'
                    pergunta: 'O que é?'
                    opcoes:
                      - 'A'
                      - 'B'
                      - 'C'
                      - 'D'
                    correta: 0
                    explicacao: 'Porque...'
                    explicacaoErrada: 'Errado porque...'
          description: 'Returns **200** (OK) as **application/json**'
        404:
          content:
            application/json:
              schema:
                type: 'object'
                properties:
                  message: 'Aula não encontrada.'
              example:
                message: 'Aula não encontrada.'
          description: 'Returns **404** (Not Found) as **application/json**'
      security: []
  /api/courses/{courseSlug}/lessons/{lessonSlug}:
    get:
      summary: 'Detalhes de uma aula específica (handle)'
      description: "Returns **200** (OK) as **application/json**\n\n _app/resources/lessons/show/show.controller.ts_ - **handle**"
      parameters:
        - in: 'path'
          name: 'courseSlug'
          description: 'Slug do curso'
          schema:
            example: ''
            type: 'string'
          required: true
        - in: 'path'
          name: 'lessonSlug'
          description: 'Slug da aula'
          schema:
            example: ''
            type: 'string'
          required: true
      tags:
        - 'LESSONS'
      responses:
        200:
          content:
            application/json:
              schema:
                type: 'object'
                properties:
                  lesson:
                    type: 'object'
                    properties:
                      slug: 'variaveis'
                      modulo: 'Módulo 1'
                      titulo: 'Variáveis'
                      subtitulo: ''
                      descricao: 'Aprenda sobre variáveis'
                      ordem: 1
                      content: '# Conteúdo em Markdown'
                      quiz:
                        type: 'object'
                        properties:
                          0:
                            type: 'object'
                            properties:
                              pergunta: 'O que é uma variável?'
                              opcoes:
                                type: 'object'
                                properties:
                                  0: 'A'
                                  1: 'B'
                                  2: 'C'
                                  3: 'D'
                              correta: 0
                              explicacao: 'Explicação'
                              explicacaoErrada: 'Explicação do erro'
                      proximosPassos:
                        type: 'object'
                        properties:
                          0:
                            type: 'object'
                            properties:
                              titulo: 'Próximo passo'
                              descricao: 'Descrição'
              example:
                lesson:
                  slug: 'variaveis'
                  modulo: 'Módulo 1'
                  titulo: 'Variáveis'
                  subtitulo: ''
                  descricao: 'Aprenda sobre variáveis'
                  ordem: 1
                  content: '# Conteúdo em Markdown'
                  quiz:
                    - pergunta: 'O que é uma variável?'
                      opcoes:
                        - 'A'
                        - 'B'
                        - 'C'
                        - 'D'
                      correta: 0
                      explicacao: 'Explicação'
                      explicacaoErrada: 'Explicação do erro'
                  proximosPassos:
                    - titulo: 'Próximo passo'
                      descricao: 'Descrição'
          description: 'Returns **200** (OK) as **application/json**'
        404:
          content:
            application/json:
              schema:
                type: 'object'
                properties:
                  message: 'Aula não encontrada.'
              example:
                message: 'Aula não encontrada.'
          description: 'Returns **404** (Not Found) as **application/json**'
      security: []
  /api/courses/{courseSlug}/modules/{moduleName}/quiz-questions:
    get:
      summary: 'Questões de quiz de um módulo específico (handle)'
      description: "Returns **200** (OK) as **application/json**\n\n _app/resources/quiz/module-questions/module-questions.controller.ts_ - **handle**"
      parameters:
        - in: 'path'
          name: 'courseSlug'
          description: 'Slug do curso'
          schema:
            example: ''
            type: 'string'
          required: true
        - in: 'path'
          name: 'moduleName'
          description: 'Nome do módulo (URL encoded)'
          schema:
            example: ''
            type: 'string'
          required: true
      tags:
        - 'QUIZ'
      responses:
        200:
          content:
            application/json:
              schema:
                type: 'object'
                properties:
                  questionCount: 5
                  questions:
                    type: 'object'
                    properties:
                      0:
                        type: 'object'
                        properties:
                          lessonTitulo: 'Variáveis'
                          lessonDescricao: 'Aprenda variáveis'
                          lessonModulo: 'Módulo 1'
                          pergunta: 'O que é?'
                          opcoes:
                            type: 'object'
                            properties:
                              0: 'A'
                              1: 'B'
                              2: 'C'
                              3: 'D'
                          correta: 0
                          explicacao: 'Porque...'
                          explicacaoErrada: 'Errado porque...'
              example:
                questionCount: 5
                questions:
                  - lessonTitulo: 'Variáveis'
                    lessonDescricao: 'Aprenda variáveis'
                    lessonModulo: 'Módulo 1'
                    pergunta: 'O que é?'
                    opcoes:
                      - 'A'
                      - 'B'
                      - 'C'
                      - 'D'
                    correta: 0
                    explicacao: 'Porque...'
                    explicacaoErrada: 'Errado porque...'
          description: 'Returns **200** (OK) as **application/json**'
        404:
          content:
            application/json:
              schema:
                type: 'object'
                properties:
                  message: 'Módulo não encontrado.'
              example:
                message: 'Módulo não encontrado.'
          description: 'Returns **404** (Not Found) as **application/json**'
      security: []
  /api/courses/{courseSlug}/quiz-questions:
    get:
      summary: 'Todas as questões de quiz de um curso (handle)'
      description: "Returns **200** (OK) as **application/json**\n\n _app/resources/quiz/questions/questions.controller.ts_ - **handle**"
      parameters:
        - in: 'path'
          name: 'courseSlug'
          description: 'Slug do curso'
          schema:
            example: ''
            type: 'string'
          required: true
      tags:
        - 'QUIZ'
      responses:
        200:
          content:
            application/json:
              schema:
                type: 'object'
                properties:
                  questionCount: 15
                  questions:
                    type: 'object'
                    properties:
                      0:
                        type: 'object'
                        properties:
                          lessonTitulo: 'Variáveis'
                          lessonDescricao: 'Aprenda variáveis'
                          lessonModulo: 'Módulo 1'
                          pergunta: 'O que é?'
                          opcoes:
                            type: 'object'
                            properties:
                              0: 'A'
                              1: 'B'
                              2: 'C'
                              3: 'D'
                          correta: 0
                          explicacao: 'Porque...'
                          explicacaoErrada: 'Errado porque...'
              example:
                questionCount: 15
                questions:
                  - lessonTitulo: 'Variáveis'
                    lessonDescricao: 'Aprenda variáveis'
                    lessonModulo: 'Módulo 1'
                    pergunta: 'O que é?'
                    opcoes:
                      - 'A'
                      - 'B'
                      - 'C'
                      - 'D'
                    correta: 0
                    explicacao: 'Porque...'
                    explicacaoErrada: 'Errado porque...'
          description: 'Returns **200** (OK) as **application/json**'
        404:
          content:
            application/json:
              schema:
                type: 'object'
                properties:
                  message: 'Curso não encontrado.'
              example:
                message: 'Curso não encontrado.'
          description: 'Returns **404** (Not Found) as **application/json**'
      security: []
